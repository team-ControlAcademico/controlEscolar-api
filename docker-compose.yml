services:
  db:
    image: postgres:16-alpine
    container_name: controlescolar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-controlescolar}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-controlescolar}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: ${DOCKER_TARGET:-development}
    container_name: controlescolar-api
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      DB_HOST: db
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules

volumes:
  postgres_data:
  api_node_modules:
